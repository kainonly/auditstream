name: Test

on:
  push:
    branches: [ v3 ]
  pull_request:
    branches: [ v3 ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test ./transfer/... -v -run "^Test(NewAuditEvent|WithMeta|WithRequest|WithResponse|WithClient|WithExtra|ChainedMethods|JSONSerialization|TimeField)" -coverprofile=coverage.out

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          fail_ci_if_error: false

  integration-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Start NATS cluster
        run: docker compose -f .github/docker-compose.yml up -d

      - name: Wait for NATS cluster
        run: |
          for i in {1..30}; do
            if nc -z localhost 4222; then
              echo "NATS is ready"
              break
            fi
            echo "Waiting for NATS..."
            sleep 1
          done

      - name: Create test config
        run: |
          mkdir -p config
          cat > config/values.yml << 'EOF'
          mode: debug
          namespace: test
          stream: audits
          nats_hosts:
            - nats://localhost:4222
          nats_token:
          victoria: http://localhost:9428
          victoria_path: /insert/jsonline?_stream_fields=stream&_msg_field=msg&_time_field=time
          batch_size: 100
          flush_interval: 5s
          EOF

      - name: Download dependencies
        run: go mod download

      - name: Run integration tests
        run: go test ./transfer/... -v -run "^TestTransfer(New|Subject|Publish|PublishAsync|PublishRaw|PublishRawAsync)$" -timeout 60s

      - name: Stop NATS cluster
        if: always()
        run: docker compose -f .github/docker-compose.yml down

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  build:
    runs-on: ubuntu-latest
    needs: [ test, lint ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Build
        run: go build -v -o auditstream .
