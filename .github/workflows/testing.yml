name: Testing

on:
  push:
    branches: [ v3 ]
  pull_request:
    branches: [ v3 ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  testing:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GO111MODULE: on
      NATS_NAMESPACE: test
      NATS_HOST: nats://127.0.0.1:4222
      NATS_TOKEN: s3cr3t

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start NATS cluster
        run: docker compose -f ".github/compose/docker-compose.yml" up -d

      - name: Wait for NATS cluster
        run: |
          for i in {1..30}; do
            if nc -z localhost 4222; then
              echo "NATS is ready"
              break
            fi
            echo "Waiting for NATS..."
            sleep 1
          done

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Run tests with coverage
        run: go test -race -covermode atomic -coverprofile=covprofile ./transfer/...

      - name: Upload coverage to Coveralls
        if: success() && github.event_name == 'push'
        run: |
          go install github.com/mattn/goveralls@latest
          goveralls -coverprofile=covprofile -service=github
        env:
          COVERALLS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
